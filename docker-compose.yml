services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stemlab}
      POSTGRES_USER: ${POSTGRES_USER:-stemlab_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_before_public_deploy}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stemlab_app}:${POSTGRES_PASSWORD:-change_me_before_public_deploy}@db:5432/${POSTGRES_DB:-stemlab}
      VITE_PUBLIC_VIEWER_MODE: ${VITE_PUBLIC_VIEWER_MODE:-false}

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    depends_on:
      - web
    ports:
      - "5173:80"

  poller:
    build:
      context: .
      dockerfile: Dockerfile.poller
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stemlab_app}:${POSTGRES_PASSWORD:-change_me_before_public_deploy}@db:5432/${POSTGRES_DB:-stemlab}
      PRINTER_POLL_INTERVAL_MS: 5000
      PRINTER_REQUEST_TIMEOUT_MS: 3000

volumes:
  postgres_data:
