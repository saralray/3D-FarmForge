# Replace CHANGE_ME with your actual values before applying.
# DATABASE_URL must match POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB below.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-creds
  namespace: stemlab-printfarm
type: Opaque
stringData:
  POSTGRES_DB: stemlab
  POSTGRES_USER: stemlab_app
  POSTGRES_PASSWORD: "CHANGE_ME"
  DATABASE_URL: "postgres://stemlab_app:CHANGE_ME@db:5432/stemlab"
