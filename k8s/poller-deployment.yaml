apiVersion: apps/v1
kind: Deployment
metadata:
  name: poller
  namespace: stemlab-printfarm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poller
  template:
    metadata:
      labels:
        app: poller
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z db 5432; do echo waiting for db; sleep 2; done"]
      containers:
        - name: poller
          image: stemlab-printfarm/poller:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-creds
                  key: DATABASE_URL
            - name: PRINTER_POLL_INTERVAL_MS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PRINTER_POLL_INTERVAL_MS
            - name: PRINTER_REQUEST_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PRINTER_REQUEST_TIMEOUT_MS
            - name: PRINTER_OFFLINE_GRACE_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PRINTER_OFFLINE_GRACE_SECONDS
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
