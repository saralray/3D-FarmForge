apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: printfarm

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  selector:
    matchLabels:
      app: web

  template:
    metadata:
      labels:
        app: web

    spec:
      containers:
        - name: web
          image: saralray/printfarm-web:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 5173

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: printfarm-secret
                  key: DATABASE_URL

            - name: VITE_PUBLIC_VIEWER_MODE
              valueFrom:
                configMapKeyRef:
                  name: printfarm-config
                  key: VITE_PUBLIC_VIEWER_MODE

            - name: MAX_BODY_BYTES
              value: "1048576"

            - name: SLICER_GRANT_SECRET
              valueFrom:
                secretKeyRef:
                  name: printfarm-secret
                  key: SLICER_GRANT_SECRET

            # Background Google Sheet → queue sync cadence + per-pull timeout.
            - name: QUEUE_SYNC_INTERVAL_MS
              value: "60000"
            - name: QUEUE_SYNC_FETCH_TIMEOUT_MS
              value: "15000"

          readinessProbe:
            httpGet:
              path: /healthz
              port: 5173
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /healthz
              port: 5173
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"

            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: printfarm

spec:
  selector:
    app: web

  ports:
    - port: 5173
      targetPort: 5173
