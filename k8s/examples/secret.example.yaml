# Example Secret template — never commit a filled-in copy.
#
# This file is here purely as a reference for the shape of the secret. The
# actual `printfarm-secret` MUST be created out-of-band so credentials never
# enter Git. Two ways:
#
#   1. Copy this file to k8s/secret.yaml (gitignored), fill in real values,
#      then apply once:
#        kubectl apply -f k8s/secret.yaml
#
#   2. Or create it directly without a file:
#        kubectl -n printfarm create secret generic printfarm-secret \
#          --from-literal=POSTGRES_DB=printfarm \
#          --from-literal=POSTGRES_USER=printfarm_app \
#          --from-literal=POSTGRES_PASSWORD="$(openssl rand -hex 32)" \
#          --from-literal=DATABASE_URL='postgresql://printfarm_app:PASSWORD@postgres:5432/printfarm'
#
# DATABASE_URL must match the user / password / db above. Once Postgres is
# initialised the password is set inside the database — rotating
# POSTGRES_PASSWORD afterwards requires an ALTER ROLE on the live database.
apiVersion: v1
kind: Secret
metadata:
  name: printfarm-secret
  namespace: printfarm
type: Opaque
stringData:
  POSTGRES_DB: replace_me
  POSTGRES_USER: replace_me
  POSTGRES_PASSWORD: replace_me_with_a_long_random_password
  DATABASE_URL: postgresql://USER:PASSWORD@postgres:5432/DB
