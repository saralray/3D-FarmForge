# The web image must be built with the same VITE_* build args that match this ConfigMap.
# VITE_GOOGLE_SHEET_QUEUE_URL and VITE_GOOGLE_FORM_URL are baked into the frontend bundle at
# build time; update app-config AND rebuild the image if those URLs change.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: stemlab-printfarm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z db 5432; do echo waiting for db; sleep 2; done"]
      containers:
        - name: web
          image: stemlab-printfarm/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5173"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-creds
                  key: DATABASE_URL
            - name: VITE_PUBLIC_VIEWER_MODE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: VITE_PUBLIC_VIEWER_MODE
            - name: VITE_GOOGLE_SHEET_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: VITE_GOOGLE_SHEET_QUEUE_URL
            - name: MAX_BODY_BYTES
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MAX_BODY_BYTES
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5173
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
