apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: stemlab-printfarm
data:
  # Runtime flags — keep VITE_PUBLIC_VIEWER_MODE in sync with the value used at image build time
  VITE_PUBLIC_VIEWER_MODE: "false"
  # Google Sheets/Form URLs used by the server-side queue sync endpoint
  VITE_GOOGLE_SHEET_QUEUE_URL: ""
  VITE_GOOGLE_FORM_URL: ""
  # Node web server
  MAX_BODY_BYTES: "1048576"
  # Poller
  PRINTER_POLL_INTERVAL_MS: "5000"
  PRINTER_REQUEST_TIMEOUT_MS: "3000"
  PRINTER_OFFLINE_GRACE_SECONDS: "30"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: stemlab-printfarm
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
      default upgrade;
      '' close;
    }

    server {
      listen 80;
      server_name _;

      client_max_body_size 2m;
      server_tokens off;

      add_header X-Content-Type-Options nosniff always;
      add_header X-Frame-Options DENY always;
      add_header Referrer-Policy strict-origin-when-cross-origin always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

      location / {
        proxy_pass http://web:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
      }
    }
