# type: LoadBalancer works with cloud providers and k3s (Klipper LB).
# For bare-metal clusters without a LoadBalancer controller, change to NodePort.
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: stemlab-printfarm
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
