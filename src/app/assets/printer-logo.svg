<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="3D printer">
  <!-- Printer frame -->
  <rect x="10" y="6" width="44" height="40" rx="3" />
  <!-- Gantry / X-axis rail -->
  <line x1="10" y1="20" x2="54" y2="20" />
  <!-- Print head -->
  <rect x="27" y="20" width="10" height="7" rx="1" fill="#38bdf8" stroke="#0f172a" />
  <!-- Nozzle -->
  <path d="M32 27 L32 32" />
  <!-- Print bed -->
  <line x1="18" y1="40" x2="46" y2="40" />
  <!-- Partially printed object on the bed -->
  <path d="M27 40 L29 33 L35 33 L37 40 Z" fill="#38bdf8" stroke="#0f172a" />
  <!-- Base / feet -->
  <line x1="16" y1="46" x2="16" y2="52" />
  <line x1="48" y1="46" x2="48" y2="52" />
  <line x1="12" y1="52" x2="52" y2="52" />
</svg>
