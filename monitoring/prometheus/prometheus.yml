# Prometheus scrape configuration for 3D-FarmLab.
#
# The print-farm metrics come from the `exporter` service (a read-only view of
# the PostgreSQL data). `exporter` resolves on both the Docker Compose network
# and the Kubernetes namespace, so this file is shared by both deployments.
global:
  scrape_interval: 5s
  scrape_timeout: 4s
  evaluation_interval: 5s

scrape_configs:
  # Printer state (printfarm_printer_online/printing/pause/error/offline, temps,
  # progress) is scraped to track the poller in near-real time. The exporter
  # opens a fresh DB connection and reads the tables on every scrape, and the
  # poller only refreshes the DB every PRINTER_POLL_INTERVAL_MS (2s default), so
  # scraping faster than that just doubles DB load for identical data. Match the
  # poll cadence.
  - job_name: printfarm
    scrape_interval: 2s
    scrape_timeout: 2s
    static_configs:
      - targets: ["exporter:9180"]

  - job_name: prometheus
    # In Docker Compose, Prometheus runs with --web.route-prefix=/prometheus, so
    # its own /metrics endpoint moves under that prefix. (Harmless in Kubernetes,
    # where Prometheus serves at root — adjust there if you scrape it.)
    metrics_path: /prometheus/metrics
    static_configs:
      - targets: ["localhost:9090"]
